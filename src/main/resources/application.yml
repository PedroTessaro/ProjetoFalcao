server:
  port: 8080
  error:
    whitelabel:
      enabled: false

spring:
  application:
    name: cyber-bullet-system

  # ===================== BANCO DE DADOS RELACIONAL (H2) =====================
  # Guarda dados estruturados e transacionais: operadores, frota de drones e
  # missoes. Em arquivo (persiste entre reinicializacoes).
  datasource:
    url: jdbc:h2:file:./data/cyberbullet;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

  # ===================== BANCO DE DADOS NAO RELACIONAL (MongoDB) =====================
  # Guarda dados de alto volume / tempo real e logs imutaveis de auditoria:
  # telemetria, eventos de ameaca e trilha de auditoria (hash-chain).
  # O MongoDB embarcado (Flapdoodle) baixa e sobe sozinho na primeira execucao.
  data:
    mongodb:
      database: cyberbullet_rt
      auto-index-creation: true

  thymeleaf:
    cache: false

# Versao do MongoDB embarcado que o Flapdoodle baixa e executa.
de:
  flapdoodle:
    mongodb:
      embedded:
        version: 7.0.12

# ===================== CONFIGURACOES DO DOMINIO =====================
cyberbullet:
  security:
    # Em ambiente de DEMONSTRACAO o codigo TOTP valido e impresso no log do
    # servidor para permitir login sem precisar de um app autenticador.
    # NUNCA habilitar isso em producao.
    demo-print-totp: true
  telemetry:
    # Intervalo (ms) do simulador de telemetria dos drones em voo.
    interval-ms: 2500

logging:
  level:
    root: INFO
    com.securus.cyberbullet: INFO
    de.flapdoodle: WARN
    org.mongodb.driver: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %-32logger{32} %msg%n"
